<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualización de Datos - Pisos Brillantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --warning-color: #f39c12;
            --success-color: #2ecc71;
            --dark-color: #34495e;
            --text-color: #333;
            --border-color: #ddd;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
            color: white;
            text-align: center;
            padding: 18px 0;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: var(--shadow);
            position: relative;
        }

        .container {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
            flex: 1;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 1.8rem;
            position: relative;
            padding-bottom: 10px;
            font-weight: bold;
        }

        h1:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background-color: var(--secondary-color);
            border-radius: 2px;
        }

        .card {
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: none;
            margin-bottom: 25px;
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
            color: white;
            border-radius: 12px 12px 0 0 !important;
            padding: 15px 20px;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
        }

        .card-header:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--secondary-color), var(--accent-color));
        }

        .card-body {
            padding: 25px;
        }

        /* Autocompletado */
        .autocomplete-container {
            position: relative;
            width: 100%;
        }

        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 5px 5px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .autocomplete-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }

        .autocomplete-item:hover {
            background-color: #f5f5f5;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        /* Foto */
        .foto-container {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 10px;
        }

        .foto-empleado {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--secondary-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .foto-empleado:hover {
            transform: scale(1.05);
        }

        .foto-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 4px solid var(--secondary-color);
            cursor: pointer;
        }

        .foto-placeholder i {
            font-size: 60px;
            color: #adb5bd;
        }

        /* Botones principales */
        .btn-buscar {
            background: linear-gradient(45deg, var(--secondary-color), #5dade2);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 50px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-buscar:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        .btn-guardar {
            background: linear-gradient(45deg, #2ecc71, #58d68d);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 50px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-guardar:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        .btn-guardar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Formulario */
        .form-label {
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 8px;
        }

        .form-label .required {
            color: var(--accent-color);
            margin-left: 3px;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.25rem rgba(52, 152, 219, 0.25);
        }

        /* Validación visual - SOLO bordes, sin mensajes */
        .form-control.is-valid {
            border-color: var(--success-color);
        }

        .form-control.is-invalid {
            border-color: var(--accent-color);
        }

        /* Badge de estado - solo nombre */
        .nombre-badge {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        /* Overlay de carga */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(52, 152, 219, 0.2);
            border-radius: 50%;
            border-top-color: var(--secondary-color);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loadingMessage {
            text-align: center;
            color: var(--dark-color);
        }

        #loadingMessage h4 {
            margin: 0 0 10px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        /* Contenido principal (siempre visible ahora) */
        #main-content {
            display: block;
        }

        /* Responsive */
        @media (max-width: 576px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .foto-empleado, .foto-placeholder {
                width: 100px;
                height: 100px;
            }
            
            .foto-placeholder i {
                font-size: 50px;
            }
            
            .btn-buscar, .btn-guardar {
                width: 100%;
            }
        }

        .required-notice {
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- Contenido principal (ahora sin protección de contraseña) -->
    <div id="main-content">
        <div class="header">
            Pisos Brillantes
        </div>

        <div class="container">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-user-edit me-2"></i>Actualización de Datos
                </div>
                <div class="card-body">
                    <div class="row g-3 mb-4">
                        <div class="col-md-8">
                            <label for="buscador-nombre" class="form-label">
                                <i class="fas fa-user me-2"></i>Selecciona tu nombre <span class="required">*</span>
                            </label>
                            <div class="autocomplete-container">
                                <input type="text" class="form-control" id="buscador-nombre" 
                                       placeholder="Escribe tu nombre..." autocomplete="off" required>
                                <div class="autocomplete-list" id="autocomplete-list"></div>
                            </div>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button class="btn btn-buscar w-100" id="btn-buscar">
                                <i class="fas fa-search me-2"></i>Buscar
                            </button>
                        </div>
                    </div>

                    <!-- Foto del empleado (clickeable para ver en grande) -->
                    <div class="foto-container" id="foto-container" style="display: none;">
                        <div id="foto-placeholder" class="foto-placeholder" onclick="mostrarFotoCompleta()">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <img id="foto-empleado" class="foto-empleado" style="display: none;" alt="Foto del empleado" onclick="mostrarFotoCompleta()">
                    </div>

                    <!-- Formulario de datos (inicialmente oculto) -->
                    <div id="formulario-datos" style="display: none;">
                        <hr class="my-4">
                        
                        <!-- SOLO el nombre del empleado -->
                        <div class="nombre-badge" id="nombre-empleado"></div>

                        <form id="form-actualizar-datos" novalidate>
                            <!-- Fecha de Nacimiento -->
                            <div class="mb-4">
                                <label for="fecha-nacimiento" class="form-label">
                                    <i class="fas fa-birthday-cake me-2 text-warning"></i>Fecha de Nacimiento
                                    <span class="required">*</span>
                                </label>
                                <input type="date" class="form-control" id="fecha-nacimiento" required>
                            </div>

                            <!-- Datos de Contacto -->
                            <h5 class="mb-3" style="color: var(--primary-color);">
                                <i class="fas fa-phone-alt me-2"></i>Datos de Contacto
                            </h5>

                            <div class="mb-3">
                                <label for="movil" class="form-label">
                                    Móvil Personal <span class="required">*</span>
                                </label>
                                <input type="tel" class="form-control" id="movil" 
                                       placeholder="0000-0000" maxlength="9" required
                                       oninput="formatearTelefono(this)">
                            </div>

                            <div class="mb-3">
                                <label for="contacto-emergencia" class="form-label">
                                    Contacto de Emergencia <span class="required">*</span>
                                </label>
                                <input type="text" class="form-control" id="contacto-emergencia" 
                                       placeholder="Nombre completo" style="text-transform: uppercase;" required>
                            </div>

                            <div class="mb-4">
                                <label for="movil-emergencia" class="form-label">
                                    Móvil de Emergencia <span class="required">*</span>
                                </label>
                                <input type="tel" class="form-control" id="movil-emergencia" 
                                       placeholder="0000-0000" maxlength="9" required
                                       oninput="formatearTelefono(this)">
                            </div>

                            <hr class="my-4">

                            <div class="d-flex justify-content-center">
                                <button type="button" class="btn btn-guardar" id="btn-guardar">
                                    <i class="fas fa-save me-2"></i>Guardar Cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- OVERLAY DE CARGA -->
    <div id="overlay">
        <div class="spinner"></div>
        <div id="loadingMessage">
            <h4>Por favor espera un momento...</h4>
            <p></p>
        </div>
    </div>

    <script>
        // URLs de los scripts de Google Apps Script
        const SCRIPT_URL_OBTENER = "https://script.google.com/macros/s/AKfycbzI3W9kPzdQO_bSKR4tYPOgD3b0Nr0akLMI5Gzw_ErhIhspq-7Y0bCtm2L6ChOgctwhpw/exec";
        const SCRIPT_URL_ENVIAR = "https://script.google.com/macros/s/AKfycbz7lGxIPoGPGhf5o70DEJ0s2Fuaukhy01qHUlkeoRmRnN7CrcArd6-PC1pU8edxE539cw/exec";

        // =====================================================
        // CONTROL DE CONTRASEÑA - MODIFICAR AQUÍ PARA ACTIVAR/DESACTIVAR
        // =====================================================
        // PASSWORD_REQUIRED = false  --> CONTRASEÑA DESHABILITADA (acceso directo)
        // PASSWORD_REQUIRED = true   --> CONTRASEÑA HABILITADA (pide clave)
        // =====================================================
        const PASSWORD_REQUIRED = false;  // Cambia a true para activar la contraseña
        
        // Contraseña de acceso (solo se usa si PASSWORD_REQUIRED = true)
        const ACCESS_PASSWORD = "12345";
        // =====================================================

        // Variables globales
        let colaboradoresActivos = [];
        let colaboradorSeleccionado = null;
        let datosOriginales = null;

        // Al cargar la página
        $(document).ready(function() {
            if (PASSWORD_REQUIRED) {
                // Si la contraseña está activada, la pedimos
                promptForPassword();
            } else {
                // Si la contraseña está desactivada, mostramos directamente
                $('#main-content').css('display', 'block');
                
                // Inicializar la aplicación
                cargarColaboradoresActivos();
                configurarEventos();
            }
        });

        /**
         * Pide la contraseña para acceder a la página
         * Solo se ejecuta si PASSWORD_REQUIRED = true
         */
        function promptForPassword() {
            Swal.fire({
                title: 'Acceso Restringido',
                html: 'Por favor, ingrese la contraseña para continuar.',
                input: 'password',
                inputPlaceholder: 'Contraseña',
                confirmButtonText: 'Ingresar',
                allowOutsideClick: false,
                allowEscapeKey: false,
                backdrop: `rgba(43, 62, 80, 0.8)`,
                preConfirm: (password) => {
                    if (password !== ACCESS_PASSWORD) {
                        Swal.showValidationMessage('Contraseña incorrecta');
                        return false;
                    }
                    return password;
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    // Contraseña correcta, mostrar contenido
                    $('#main-content').css('display', 'block');
                    
                    // Inicializar la aplicación
                    cargarColaboradoresActivos();
                    configurarEventos();
                } else {
                    // Si cierra el modal sin ingresar, vuelve a pedir
                    promptForPassword();
                }
            });
        }

        /**
         * Carga la lista de colaboradores activos desde el script GET
         */
        function cargarColaboradoresActivos() {
            $('#overlay').css('display', 'flex');
            $('#loadingMessage p').text('Cargando lista de colaboradores...');

            $.get(SCRIPT_URL_OBTENER)
                .done(function(data) {
                    $('#overlay').hide();
                    
                    if (data.error) {
                        Swal.fire({
                            title: 'Error',
                            text: 'No se pudo cargar la lista de colaboradores: ' + (data.mensaje || 'Error desconocido'),
                            icon: 'error',
                            confirmButtonText: 'Reintentar'
                        }).then(() => {
                            cargarColaboradoresActivos();
                        });
                        return;
                    }

                    colaboradoresActivos = (data.activos || []).map(col => ({
                        ...col,
                        movil: formatearNumeroTelefono(col.movil),
                        contactoEmergencia: col.contactoEmergencia ? String(col.contactoEmergencia) : '',
                        movilEmergencia: formatearNumeroTelefono(col.movilEmergencia),
                        fechaNacimiento: col.fechaNacimiento ? String(col.fechaNacimiento) : ''
                    }));

                })
                .fail(function() {
                    $('#overlay').hide();
                    Swal.fire({
                        title: 'Error de Conexión',
                        text: 'No se pudo conectar al servidor. Verifique su conexión a internet.',
                        icon: 'error',
                        confirmButtonText: 'Reintentar'
                    }).then(() => {
                        cargarColaboradoresActivos();
                    });
                });
        }

        /**
         * Formatea un número de teléfono de 8 dígitos a formato 0000-0000
         */
        function formatearNumeroTelefono(numero) {
            if (numero === null || numero === undefined) return '';
            
            const numeroStr = String(numero).trim();
            if (numeroStr === '') return '';
            
            if (/^\d{4}-\d{4}$/.test(numeroStr)) return numeroStr;
            
            let soloDigitos = numeroStr.replace(/\D/g, '');
            
            if (soloDigitos.length === 8) {
                return soloDigitos.substring(0, 4) + '-' + soloDigitos.substring(4, 8);
            }
            
            return soloDigitos;
        }

        /**
         * Configura los eventos de la página
         */
        function configurarEventos() {
            // Autocompletado al escribir
            $('#buscador-nombre').on('input', function() {
                const valor = $(this).val().toLowerCase();
                const autocompleteList = $('#autocomplete-list');

                if (valor.length < 1) {
                    autocompleteList.hide();
                    return;
                }

                if (!colaboradoresActivos || colaboradoresActivos.length === 0) return;

                const sugerencias = colaboradoresActivos
                    .filter(col => col.nombre.toLowerCase().includes(valor))
                    .slice(0, 10);

                autocompleteList.empty();
                
                if (sugerencias.length > 0) {
                    sugerencias.forEach(sug => {
                        autocompleteList.append(`<div class="autocomplete-item" data-nombre="${sug.nombre}">${sug.nombre}</div>`);
                    });
                    autocompleteList.show();
                } else {
                    autocompleteList.hide();
                }
            });

            // Seleccionar del autocompletado
            $(document).on('click', '.autocomplete-item', function() {
                const nombre = $(this).data('nombre');
                $('#buscador-nombre').val(nombre);
                $('#autocomplete-list').hide();
                
                colaboradorSeleccionado = null;
                $('#foto-container').hide();
                $('#formulario-datos').hide();
                limpiarFormulario();
            });

            // Ocultar autocompletado al hacer clic fuera
            $(document).on('click', function(e) {
                if (!$(e.target).closest('.autocomplete-container').length) {
                    $('#autocomplete-list').hide();
                }
            });

            // Botón Buscar
            $('#btn-buscar').on('click', buscarColaborador);

            // Botón Guardar
            $('#btn-guardar').on('click', guardarCambios);

            // Permitir buscar con Enter
            $('#buscador-nombre').on('keypress', function(e) {
                if (e.which === 13) {
                    e.preventDefault();
                    buscarColaborador();
                }
            });

            // Validación en tiempo real para teléfonos
            $(document).on('input', '#movil, #movil-emergencia', function() {
                formatearTelefono(this);
                validarCampo(this);
            });

            $(document).on('input', '#contacto-emergencia', function() {
                validarCampo(this);
            });

            $(document).on('change', '#fecha-nacimiento', function() {
                validarCampo(this);
            });
        }

        /**
         * Valida un campo individual (solo bordes, sin mensajes)
         */
        function validarCampo(campo) {
            if (!campo) return;
            
            const $campo = $(campo);
            $campo.removeClass('is-valid is-invalid');
            
            const valor = $campo.val();
            let esValido = false;
            
            if ($campo.attr('id') === 'fecha-nacimiento') {
                if (valor) {
                    const fecha = new Date(valor);
                    const hoy = new Date();
                    hoy.setHours(0, 0, 0, 0);
                    esValido = !isNaN(fecha.getTime()) && fecha <= hoy;
                }
            } 
            else if ($campo.attr('id') === 'movil' || $campo.attr('id') === 'movil-emergencia') {
                esValido = /^\d{4}-\d{4}$/.test(valor);
            }
            else if ($campo.attr('id') === 'contacto-emergencia') {
                esValido = valor && valor.trim().length >= 3;
            }
            
            if (esValido) {
                $campo.addClass('is-valid');
            } else {
                $campo.addClass('is-invalid');
            }
            
            return esValido;
        }

        /**
         * Busca los datos del colaborador seleccionado
         */
        function buscarColaborador() {
            const nombreBuscado = $('#buscador-nombre').val().trim();
            
            if (!nombreBuscado) {
                Swal.fire({
                    title: 'Campo vacío',
                    text: 'Por favor, escribe tu nombre para buscar.',
                    icon: 'warning',
                    confirmButtonText: 'Entendido'
                });
                return;
            }

            colaboradorSeleccionado = colaboradoresActivos.find(col => 
                col.nombre.toLowerCase() === nombreBuscado.toLowerCase()
            );

            if (!colaboradorSeleccionado) {
                Swal.fire({
                    title: 'No encontrado',
                    text: 'No se encontró un colaborador con ese nombre. Verifica que esté escrito correctamente.',
                    icon: 'error',
                    confirmButtonText: 'Entendido'
                });
                return;
            }

            datosOriginales = {
                fechaNacimiento: colaboradorSeleccionado.fechaNacimiento || '',
                movil: colaboradorSeleccionado.movil || '',
                contactoEmergencia: colaboradorSeleccionado.contactoEmergencia || '',
                movilEmergencia: colaboradorSeleccionado.movilEmergencia || ''
            };

            mostrarFoto(colaboradorSeleccionado);
            mostrarDatosEnFormulario(colaboradorSeleccionado);
            
            $('#formulario-datos').show();
            
            $('html, body').animate({
                scrollTop: $('#formulario-datos').offset().top - 20
            }, 500);
        }

        /**
         * Muestra la foto del colaborador
         */
        function mostrarFoto(colaborador) {
            const fotoContainer = $('#foto-container');
            const fotoPlaceholder = $('#foto-placeholder');
            const fotoEmpleado = $('#foto-empleado');

            fotoContainer.show();

            if (colaborador.fotoUrl && colaborador.fotoUrl.trim() !== '') {
                fotoPlaceholder.hide();
                fotoEmpleado.show();
                fotoEmpleado.attr('src', colaborador.fotoUrl);
                fotoEmpleado.attr('alt', `Foto de ${colaborador.nombre}`);
                
                fotoEmpleado.on('error', function() {
                    $(this).hide();
                    fotoPlaceholder.show();
                });
            } else {
                fotoPlaceholder.show();
                fotoEmpleado.hide();
            }
        }

        /**
         * Muestra los datos del colaborador en el formulario
         */
        function mostrarDatosEnFormulario(colaborador) {
            $('#fecha-nacimiento').val(colaborador.fechaNacimiento || '');
            $('#movil').val(colaborador.movil || '');
            $('#contacto-emergencia').val(colaborador.contactoEmergencia || '');
            $('#movil-emergencia').val(colaborador.movilEmergencia || '');

            // SOLO el nombre, sin texto adicional
            $('#nombre-empleado').text(colaborador.nombre);

            validarCampo($('#fecha-nacimiento')[0]);
            validarCampo($('#movil')[0]);
            validarCampo($('#contacto-emergencia')[0]);
            validarCampo($('#movil-emergencia')[0]);
        }

        /**
         * Limpia el formulario
         */
        function limpiarFormulario() {
            $('#fecha-nacimiento').val('');
            $('#movil').val('');
            $('#contacto-emergencia').val('');
            $('#movil-emergencia').val('');
            $('#nombre-empleado').empty();
            
            $('#foto-placeholder').show();
            $('#foto-empleado').hide();
            
            $('.form-control').removeClass('is-valid is-invalid');
        }

        /**
         * Guarda los cambios del colaborador
         */
        function guardarCambios() {
            if (!colaboradorSeleccionado) {
                Swal.fire({
                    title: 'Error',
                    text: 'No hay un colaborador seleccionado. Por favor, busca tu nombre primero.',
                    icon: 'warning',
                    confirmButtonText: 'Entendido'
                });
                return;
            }

            const valido = validarFormularioCompleto();
            
            if (!valido) {
                Swal.fire({
                    title: 'Campos incompletos',
                    text: 'Por favor, completa todos los campos obligatorios correctamente.',
                    icon: 'error',
                    confirmButtonText: 'Entendido'
                });
                return;
            }

            const datosActualizados = {
                fechaNacimiento: $('#fecha-nacimiento').val(),
                movil: $('#movil').val(),
                contactoEmergencia: $('#contacto-emergencia').val().toUpperCase().trim(),
                movilEmergencia: $('#movil-emergencia').val()
            };

            if (!hayCambios(datosActualizados)) {
                Swal.fire({
                    title: 'Sin cambios',
                    text: 'No se detectaron cambios en tus datos.',
                    icon: 'info',
                    confirmButtonText: 'Entendido'
                });
                return;
            }

            Swal.fire({
                title: '¿Confirmar cambios?',
                html: `
                    <p>¿Estás seguro de que deseas actualizar tus datos?</p>
                    <div class="text-start small">
                        <strong>Fecha Nacimiento:</strong> ${formatearFecha(datosActualizados.fechaNacimiento) || 'No especificada'}<br>
                        <strong>Móvil:</strong> ${datosActualizados.movil}<br>
                        <strong>Contacto Emergencia:</strong> ${datosActualizados.contactoEmergencia}<br>
                        <strong>Móvil Emergencia:</strong> ${datosActualizados.movilEmergencia}
                    </div>
                `,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Sí, guardar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    enviarActualizacion(datosActualizados);
                }
            });
        }

        /**
         * Valida el formulario completo
         */
        function validarFormularioCompleto() {
            const fechaValida = validarCampo($('#fecha-nacimiento')[0]);
            const movilValido = validarCampo($('#movil')[0]);
            const contactoValido = validarCampo($('#contacto-emergencia')[0]);
            const movilEmergenciaValido = validarCampo($('#movil-emergencia')[0]);
            
            return fechaValida && movilValido && contactoValido && movilEmergenciaValido;
        }

        /**
         * Verifica si hubo cambios en los datos
         */
        function hayCambios(nuevosDatos) {
            return (
                nuevosDatos.fechaNacimiento !== (datosOriginales.fechaNacimiento || '') ||
                nuevosDatos.movil !== (datosOriginales.movil || '') ||
                nuevosDatos.contactoEmergencia !== (datosOriginales.contactoEmergencia || '') ||
                nuevosDatos.movilEmergencia !== (datosOriginales.movilEmergencia || '')
            );
        }

        /**
         * Envía la actualización al script POST
         */
        function enviarActualizacion(datosActualizados) {
            $('#overlay').css('display', 'flex');
            $('#loadingMessage p').text('Guardando tus cambios...');

            const colaboradorActualizado = {
                ...colaboradorSeleccionado,
                fechaNacimiento: datosActualizados.fechaNacimiento,
                movil: datosActualizados.movil,
                contactoEmergencia: datosActualizados.contactoEmergencia,
                movilEmergencia: datosActualizados.movilEmergencia
            };

            $.ajax({
                url: SCRIPT_URL_ENVIAR,
                method: 'POST',
                data: {
                    accion: 'editar_colaborador',
                    colaboradorOriginal: JSON.stringify(colaboradorSeleccionado),
                    datosNuevos: JSON.stringify(colaboradorActualizado)
                },
                dataType: 'text',
                success: function(response) {
                    $('#overlay').hide();
                    
                    if (response === 'Éxito') {
                        Swal.fire({
                            title: '¡Éxito!',
                            text: 'Tus datos han sido actualizados correctamente.',
                            icon: 'success',
                            confirmButtonText: 'Excelente'
                        }).then(() => {
                            datosOriginales = { ...datosActualizados };
                            colaboradorSeleccionado = { ...colaboradorActualizado };
                            cargarColaboradoresActivos();
                        });
                    } else {
                        Swal.fire({
                            title: 'Error',
                            text: 'Hubo un problema al actualizar tus datos: ' + response,
                            icon: 'error',
                            confirmButtonText: 'Entendido'
                        });
                    }
                },
                error: function() {
                    $('#overlay').hide();
                    Swal.fire({
                        title: 'Error de Conexión',
                        text: 'No se pudo conectar al servidor. Intenta de nuevo.',
                        icon: 'error',
                        confirmButtonText: 'Entendido'
                    });
                }
            });
        }

        /**
         * Formatea un número de teléfono al formato 0000-0000
         */
        function formatearTelefono(input) {
            if (!input) return;
            
            let valor = input.value.replace(/\D/g, '');
            valor = valor.substring(0, 8);
            
            if (valor.length > 4) {
                valor = valor.substring(0, 4) + '-' + valor.substring(4, 8);
            }
            
            input.value = valor;
        }

        /**
         * Formatea una fecha YYYY-MM-DD a DD/MM/YYYY para mostrar
         */
        function formatearFecha(fechaStr) {
            if (!fechaStr) return '';
            const partes = fechaStr.split('-');
            if (partes.length === 3) {
                return `${partes[2]}/${partes[1]}/${partes[0]}`;
            }
            return fechaStr;
        }

        /**
         * Muestra la foto en tamaño completo al hacer clic
         */
        function mostrarFotoCompleta() {
            if (!colaboradorSeleccionado) return;
            
            const colaborador = colaboradorSeleccionado;
            
            if (!colaborador.fotoUrl || colaborador.fotoUrl.trim() === '') {
                Swal.fire({
                    title: colaborador.nombre,
                    html: `
                        <div style="text-align: center; padding: 20px;">
                            <i class="fas fa-user-circle" style="font-size: 150px; color: #bdc3c7;"></i>
                            <p style="margin-top: 15px; color: #7f8c8d;">No hay foto disponible</p>
                        </div>
                    `,
                    showCloseButton: true,
                    showConfirmButton: false
                });
                return;
            }

            Swal.fire({
                title: colaborador.nombre,
                html: `
                    <div style="text-align: center;">
                        <img src="${colaborador.fotoUrl}" 
                             alt="${colaborador.nombre}" 
                             style="max-width: 100%; max-height: 70vh; border-radius: 8px; box-shadow: 0 5px 25px rgba(0,0,0,0.2);">
                    </div>
                `,
                showCloseButton: true,
                showConfirmButton: false,
                width: 'auto',
                background: '#1a1a1a',
                customClass: {
                    title: 'text-white'
                }
            });
        }
    </script>
</body>
</html>
