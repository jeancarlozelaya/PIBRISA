<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pisos Brillantes - Devoluciones</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #2c3e50;
      --secondary-color: #3498db;
      --accent-color: #e74c3c;
      --success-color: #2ecc71;
      --warning-color: #f39c12;
      --light-color: #ecf0f1;
      --dark-color: #34495e;
      --text-color: #333;
      --border-color: #ddd;
      --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f7fa;
      color: var(--text-color);
      line-height: 1.6;
    }

    .header {
      background: linear-gradient(135deg, var(--primary-color), var(--dark-color));
      color: white;
      text-align: center;
      padding: 18px 0;
      font-size: 1.5rem;
      font-weight: bold;
      box-shadow: var(--shadow);
      position: relative;
    }

    .form-container {
      width: 90%;
      max-width: 1300px;
      margin: 25px auto;
      padding: 25px;
      background-color: white;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    h1 {
      text-align: center;
      color: var(--primary-color);
      margin-bottom: 25px;
      font-size: 1.8rem;
      position: relative;
      padding-bottom: 10px;
    }

    h1:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 4px;
      background-color: var(--secondary-color);
      border-radius: 2px;
    }

    .search-container {
      margin: 20px 0;
      position: relative;
    }

    #search-input {
      width: 100%;
      padding: 14px 20px;
      padding-left: 45px;
      font-size: 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background-color: white;
      transition: var(--transition);
    }

    #search-input:focus {
      border-color: var(--secondary-color);
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
      outline: none;
    }

    .search-container:before {
      content: '\f002';
      font-family: 'Font Awesome 5 Free';
      font-weight: 900;
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      z-index: 2;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 0.9em;
    }

    th {
      background-color: var(--primary-color);
      color: white;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    th, td {
      padding: 12px 15px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
    }
    
    tr:hover {
      background-color: #f5f5f5;
    }

    .cantidad-input {
      width: 60px;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      text-align: center;
    }

    .subarea-select {
      width: auto;
      padding: 8px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      text-align: center;
      min-width: 150px;
    }

    .button-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      gap: 20px;
    }
    
    .button-container button {
      font-size: 16px;
      padding: 12px 24px;
      background-color: var(--success-color);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: var(--transition);
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .table-container {
      width: 100%;
      max-height: 60vh;
      overflow-y: auto;
    }
    
    @media screen and (max-width: 768px) {
      .table-container {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      
      table {
        font-size: 0.8em;
      }
      
      th, td {
        padding: 8px 10px;
      }
      
      .cantidad-input {
        width: 50px;
      }
      
      .subarea-select {
        min-width: 120px;
        font-size: 0.8em;
      }
    }

    /* Overlay EXACTAMENTE como en la página de referencia */
    #overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.95);
      justify-content: center;
      align-items: center;
      z-index: 9999;
      flex-direction: column;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(52, 152, 219, 0.2);
      border-radius: 50%;
      border-top-color: var(--secondary-color);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loadingMessage {
      text-align: center;
      color: var(--dark-color);
    }

    #loadingMessage h4 {
      margin: 0 0 10px;
      font-size: 1.3rem;
    }

    #loadingMessage p {
      margin: 0;
      color: #7f8c8d;
    }

    .no-results {
      text-align: center;
      padding: 20px;
      color: #666;
      font-style: italic;
    }

    .add-more-btn {
      background-color: var(--success-color);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85em;
      transition: var(--transition);
    }

    .add-more-btn:hover {
      background-color: #218838;
    }

    .delete-entry-btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85em;
      transition: var(--transition);
    }

    .delete-entry-btn:hover {
      background-color: #c82333;
    }

    .confirm-delete-btn {
      background-color: var(--success-color);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1.1em;
      font-weight: bold;
      transition: var(--transition);
    }
    
    .confirm-delete-btn:hover {
      background-color: #218838;
    }
    
    .cancel-delete-btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1.1em;
      font-weight: bold;
      transition: var(--transition);
    }
    
    .cancel-delete-btn:hover {
      background-color: #c82333;
    }

    .additional-entry {
      background-color: #e9ecef;
    }

    .quantity-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .quantity-button {
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1em;
      line-height: 1;
      width: 30px;
      height: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      transition: var(--transition);
    }

    .quantity-minus-button {
      background-color: var(--accent-color);
    }

    .quantity-minus-button:hover {
      background-color: #c82333;
    }

    .quantity-plus-button {
      background-color: var(--success-color);
    }

    .quantity-plus-button:hover {
      background-color: #218838;
    }

    .quantity-button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    /* Modal de contraseña EXACTAMENTE como SweetAlert2 en la página de referencia */
    .custom-swal-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(43, 62, 80, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }

    .custom-swal-container.active {
      opacity: 1;
      visibility: visible;
    }

    .custom-swal-content {
      background: white;
      width: 90%;
      max-width: 500px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 25px;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.3s ease-in-out;
      text-align: center;
    }

    .custom-swal-container.active .custom-swal-content {
      transform: translateY(0);
    }

    .custom-swal-header {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }

    .custom-swal-header h2 {
      margin: 0;
      font-size: 1.5em;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .custom-swal-header h2 i {
      color: var(--secondary-color);
    }

    .custom-swal-content p {
      margin-bottom: 20px;
      color: var(--text-color);
    }

    .custom-swal-content input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 16px;
      transition: var(--transition);
    }

    .custom-swal-content input:focus {
      border-color: var(--secondary-color);
      outline: none;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    .custom-swal-content button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--secondary-color), #0069d9);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .custom-swal-content button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .custom-swal-error {
      color: var(--accent-color);
      margin-top: 10px;
      display: none;
      font-size: 0.9em;
    }

    @media (max-width: 768px) {
      .form-container {
        width: 95%;
        padding: 15px;
        margin: 15px auto;
      }
      
      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Modal de contraseña estilo SweetAlert2 -->
  <div id="custom-password-modal" class="custom-swal-container">
    <div class="custom-swal-content">
      <div class="custom-swal-header">
        <h2><i class="fas fa-lock"></i> Acceso Restringido</h2>
      </div>
      <p>Ingrese la contraseña para procesar las devoluciones</p>
      <input type="password" id="custom-password-input" placeholder="Contraseña" autocomplete="off">
      <button id="custom-password-submit">Verificar</button>
      <div id="custom-password-error" class="custom-swal-error">Contraseña incorrecta. Intente nuevamente.</div>
    </div>
  </div>

  <div id="main-content">
    <div class="header">Pisos Brillantes</div>
    
    <div class="form-container">
      <h1>Devoluciones de Insumos</h1>

      <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar por Edificio o Producto..." oninput="filtrarTabla()" autocomplete="off">
      </div>

      <div id="tabla-devoluciones-container" class="table-container">
          <table id="tabla-devoluciones">
          <thead>
            <tr>
              <th>Edificio</th>
              <th>Producto</th>
              <th>Cantidad Pendiente</th>
              <th>Devolver</th>
              <th>Sub-área</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="devoluciones-body">
            </tbody>
        </table>
      </div>

      <div class="button-container">
        <button type="button" id="btn-enviar" disabled onclick="verificarAutenticacion()">Enviar Devoluciones</button>
      </div>
    </div>

    <div id="overlay">
      <div class="spinner"></div>
      <div id="loadingMessage">
        <h4>Por favor espera un momento...</h4>
        <p></p>
      </div>
    </div>
  </div>

<script>
  // Variables globales
  let devoluciones = [];
  let editedEntries = {}; 

  const CORRECT_PASSWORD = "macdel1";
  const AUTH_KEY = "pb_auth";
  const AUTH_EXPIRATION_HOURS = 24;

  // Configuración de opciones de Sub-área por edificio
  const OPCIONES_SUBAREA = {
    'Otros (Abajo)': ['Despacho', 'Baños Transportistas', 'Salón Vial'],
    'Administración': ['Baño de Gerencia', 'Baño de Visitas', 'Baño de Sala de Reuniones', 'Baños de Hombres', 'Baño de Mujeres', 'Oficina X']
  };

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('main-content').style.display = 'block';
    cargarDevolucionesPendientes();
  });

  function verificarAutenticacion() {
    const hasValidEntries = Object.values(editedEntries).some(entry => entry.cantidad > 0);

    if (!hasValidEntries) {
      Swal.fire('Advertencia', 'No has ingresado cantidades para devolver (deben ser mayores a 0).', 'warning');
      return;
    }
    
    const authData = obtenerAuthData();
    
    if (authData && authData.authenticated && !haExpiradoAuth(authData.fecha)) {
      enviarDevoluciones();
    } else {
      solicitarContrasena();
    }
  }

  function obtenerAuthData() {
    const authData = localStorage.getItem(AUTH_KEY);
    return authData ? JSON.parse(authData) : null;
  }

  function haExpiradoAuth(fechaAuth) {
    const fechaAuthObj = new Date(fechaAuth);
    const ahora = new Date();
    const diferenciaHoras = (ahora - fechaAuthObj) / (1000 * 60 * 60);
    return diferenciaHoras >= AUTH_EXPIRATION_HOURS;
  }

  function guardarAuthExitosa() {
    const authData = {
      authenticated: true,
      fecha: new Date().toISOString()
    };
    localStorage.setItem(AUTH_KEY, JSON.stringify(authData));
  }

  function solicitarContrasena() {
    const modal = document.getElementById('custom-password-modal');
    const passwordInput = document.getElementById('custom-password-input');
    const passwordError = document.getElementById('custom-password-error');
    
    modal.classList.add('active');
    passwordInput.value = '';
    passwordInput.focus();
    passwordError.style.display = 'none';
    
    const submitBtn = document.getElementById('custom-password-submit');
    const newSubmitBtn = submitBtn.cloneNode(true);
    submitBtn.parentNode.replaceChild(newSubmitBtn, submitBtn);
    
    newSubmitBtn.onclick = function() {
      if (passwordInput.value === CORRECT_PASSWORD) {
        guardarAuthExitosa();
        modal.classList.remove('active');
        enviarDevoluciones();
      } else {
        passwordError.style.display = 'block';
        passwordInput.value = '';
        passwordInput.focus();
      }
    };
    
    passwordInput.onkeypress = function(e) {
      if (e.key === 'Enter') {
        newSubmitBtn.click();
      }
    };
  }

  function cerrarDialogoContrasena() {
    document.getElementById('custom-password-modal').classList.remove('active');
  }

  function cargarDevolucionesPendientes() {
    const overlay = document.getElementById('overlay');
    overlay.style.display = 'flex';
    $('#devoluciones-body').empty().append('<tr><td colspan="6" style="text-align: center;">Cargando datos...</td></tr>');
    
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzry90KfyKs_kxUpg-8MWzB_veVTrlobyaoB4rn6j1aLtK8Ycxs7YEeSDfojN365KBT/exec?action=obtenerDevoluciones";
    
    $.ajax({
      url: scriptUrl,
      type: "GET",
      dataType: "json",
      success: function(data) {
        overlay.style.display = 'none';
        console.log("Respuesta del servidor:", data); 
        
        if (data.error) {
          mostrarError(data.mensaje || "Error al cargar devoluciones");
          return;
        }
        
        if (!data.devoluciones) {
          mostrarError("Formato de respuesta inválido");
          return;
        }
        
        devoluciones = data.devoluciones;
        mostrarDevolucionesEnUI();
      },
      error: function(xhr, status, error) {
        overlay.style.display = 'none';
        console.error("Error en la solicitud:", status, error, xhr.responseText);
        
        let errorMsg = "Error al conectar con el servidor";
        try {
          const response = JSON.parse(xhr.responseText);
          errorMsg = response.error || response.mensaje || errorMsg;
        } catch (e) {}
        
        mostrarError(errorMsg);
      }
    });
  }

  function mostrarError(mensaje) {
    $('#devoluciones-body').empty().append(`<tr><td colspan="6" style="text-align: center; color: red;">${mensaje}</td></tr>`);
    document.getElementById('btn-enviar').disabled = true;
    
    Swal.fire({
      title: 'Error',
      text: mensaje,
      icon: 'error',
      confirmButtonText: 'Entendido'
    });
  }

  function obtenerOpcionesSubarea(area) {
    return OPCIONES_SUBAREA[area] || [];
  }

  function mostrarDevolucionesEnUI() {
    const tbody = $('#devoluciones-body');
    tbody.empty();
    
    if (devoluciones.length === 0) {
      tbody.append('<tr><td colspan="6" class="no-results">No hay devoluciones pendientes</td></tr>');
      document.getElementById('btn-enviar').disabled = true;
      return;
    }
    
    devoluciones.forEach((devolucion, index) => {
      const entryId = `${index}-0`; 
      editedEntries[entryId] = {
          rowId: devolucion.rowId,
          originalIndex: index,
          cantidad: 0,
          subarea: '',
          fechaOriginal: devolucion.fecha,
          horaOriginal: devolucion.hora,
          colaborador: devolucion.colaborador,
          area: devolucion.area,
          producto: devolucion.producto,
          cantidadSalida: devolucion.cantidadSalida,
          cantidadDevuelta: devolucion.cantidadDevuelta,
          cantidadPendiente: devolucion.cantidadPendiente,
          estado: devolucion.estado
      };

      appendDevolucionRow(devolucion, index, 0);
    });
    
    document.getElementById('btn-enviar').disabled = true;
  }

  function appendDevolucionRow(devolucion, originalIndex, entryNumber) {
      const tbody = $('#devoluciones-body');
      const entryId = `${originalIndex}-${entryNumber}`;
      const area = devolucion.area;
      const opciones = obtenerOpcionesSubarea(area);
      const tieneSubarea = opciones.length > 0;

      const subareaHtml = tieneSubarea ? `
        <select class="subarea-select"
                id="select-subarea-${entryId}"
                onchange="manejarInputSubarea('${entryId}')">
            <option value="">Seleccione</option>
            ${opciones.map(opcion => 
                `<option value="${opcion}" ${editedEntries[entryId].subarea === opcion ? 'selected' : ''}>${opcion}</option>`
            ).join('')}
        </select>
      ` : `<span></span>`;

      const rowClass = entryNumber > 0 ? 'data-row additional-entry' : 'data-row';

      const rowHtml = `
        <tr id="row-${entryId}" class="${rowClass}" data-original-index="${originalIndex}">
          <td class="edificio">${entryNumber === 0 ? devolucion.area : ''}</td>
          <td class="producto">${entryNumber === 0 ? devolucion.producto : ''}</td>
          <td class="cantidad-pendiente">${entryNumber === 0 ? devolucion.cantidadPendiente : ''}</td>
          <td>
            <div class="quantity-controls">
                <button type="button" class="quantity-button quantity-minus-button" onclick="cambiarCantidad('${entryId}', -1, ${devolucion.cantidadPendiente})">-</button>
                <input type="number" 
                       class="cantidad-input" 
                       id="input-cantidad-${entryId}" 
                       min="0" 
                       max="${devolucion.cantidadPendiente}" 
                       value="${editedEntries[entryId].cantidad}"
                       oninput="manejarInputDevolver('${entryId}', ${devolucion.cantidadPendiente})" autocomplete="off">
                <button type="button" class="quantity-button quantity-plus-button" onclick="cambiarCantidad('${entryId}', 1, ${devolucion.cantidadPendiente})">+</button>
            </div>
          </td>
          <td>${subareaHtml}</td>
          <td>
            ${entryNumber === 0 ? 
                `<button class="add-more-btn" onclick="agregarMasEntradas(${originalIndex})">Agregar Más</button>` 
                : 
                `
                <div id="action-buttons-container-${entryId}" style="display: flex; gap: 5px; justify-content: center;">
                    <button class="delete-entry-btn" id="delete-btn-${entryId}" onclick="prepararEliminar('${entryId}')">Eliminar</button>
                    <button class="confirm-delete-btn" id="confirm-btn-${entryId}" style="display:none;" onclick="confirmarEliminar('${entryId}')">✓</button>
                    <button class="cancel-delete-btn" id="cancel-btn-${entryId}" style="display:none;" onclick="cancelarEliminar('${entryId}')">✕</button>
                </div>
                `
            }
          </td>
        </tr>
      `;
      
      if (entryNumber === 0) {
          tbody.append(rowHtml);
      } else {
          $(`#tabla-devoluciones tr[data-original-index='${originalIndex}']`).last().after(rowHtml);
      }
  }

  function agregarMasEntradas(originalIndex) {
      const originalDevolucion = devoluciones[originalIndex];
      
      let nextEntryNumber = 0;
      Object.keys(editedEntries).forEach(key => {
          const [idx, entryNum] = key.split('-');
          if (parseInt(idx) === originalIndex) {
              if (parseInt(entryNum) >= nextEntryNumber) {
                  nextEntryNumber = parseInt(entryNum) + 1;
              }
          }
      });

      const newEntryId = `${originalIndex}-${nextEntryNumber}`;
      editedEntries[newEntryId] = {
          rowId: originalDevolucion.rowId,
          originalIndex: originalIndex,
          cantidad: 0,
          subarea: '',
          fechaOriginal: originalDevolucion.fecha,
          horaOriginal: originalDevolucion.hora,
          colaborador: originalDevolucion.colaborador,
          area: originalDevolucion.area,
          producto: originalDevolucion.producto,
          cantidadSalida: originalDevolucion.cantidadSalida,
          cantidadDevuelta: originalDevolucion.cantidadDevuelta,
          cantidadPendiente: originalDevolucion.cantidadPendiente,
          estado: originalDevolucion.estado
      };
      appendDevolucionRow(originalDevolucion, originalIndex, nextEntryNumber);
      filtrarTabla();
      actualizarEstadoBotonEnviar();
  }

  function prepararEliminar(entryId) {
      document.getElementById(`delete-btn-${entryId}`).style.display = 'none';
      document.getElementById(`confirm-btn-${entryId}`).style.display = 'inline-block';
      document.getElementById(`cancel-btn-${entryId}`).style.display = 'inline-block';
  }

  function confirmarEliminar(entryId) {
      delete editedEntries[entryId];
      $(`#row-${entryId}`).remove();
      actualizarEstadoBotonEnviar();
  }

  function cancelarEliminar(entryId) {
      document.getElementById(`delete-btn-${entryId}`).style.display = 'inline-block';
      document.getElementById(`confirm-btn-${entryId}`).style.display = 'none';
      document.getElementById(`cancel-btn-${entryId}`).style.display = 'none';
  }

  function filtrarTabla() {
    const searchText = document.getElementById('search-input').value.toLowerCase().trim();
    const keywords = searchText.split(' ').filter(keyword => keyword.length > 0);

    const rows = document.querySelectorAll('#devoluciones-body .data-row');
    let hasResults = false;
    
    rows.forEach(row => {
      const originalIndex = row.dataset.originalIndex;
      const entryNumber = parseInt(row.id.split('-')[2]);

      if (entryNumber === 0) {
          const edificio = row.querySelector('.edificio').textContent.toLowerCase();
          const producto = row.querySelector('.producto').textContent.toLowerCase();
          
          let matches = true;
          if (keywords.length > 0) {
              matches = keywords.every(keyword => 
                  edificio.includes(keyword) || 
                  producto.includes(keyword)
              );
          }

          if (matches) {
            row.style.display = '';
            hasResults = true;
            $(`tr[data-original-index='${originalIndex}'][id^='row-${originalIndex}-']`).show();
          } else {
            row.style.display = 'none';
            $(`tr[data-original-index='${originalIndex}'][id^='row-${originalIndex}-']`).hide();
          }
      }
    });
    
    const noResultsRow = document.querySelector('#devoluciones-body .no-results');
    if (!hasResults && devoluciones.length > 0) {
      if (!noResultsRow) {
        $('#devoluciones-body').append('<tr><td colspan="6" class="no-results">No se encontraron resultados</td></tr>');
      }
    } else if (noResultsRow) {
      noResultsRow.remove();
    }
  }

  function manejarInputDevolver(entryId, maxCantidadPendienteOriginal) {
      const input = document.getElementById(`input-cantidad-${entryId}`);
      let proposedValue = parseInt(input.value) || 0;

      if (proposedValue < 0) {
          proposedValue = 0;
      }
      
      const [originalIndexStr] = entryId.split('-');
      const originalIndex = parseInt(originalIndexStr);

      let sumOfQuantitiesExcludingCurrent = 0;
      for (const id in editedEntries) {
          if (id === entryId) continue;
          const entry = editedEntries[id];
          if (entry.originalIndex === originalIndex) {
              sumOfQuantitiesExcludingCurrent += entry.cantidad;
          }
      }

      const totalAfterProposedChange = sumOfQuantitiesExcludingCurrent + proposedValue;

      if (totalAfterProposedChange > maxCantidadPendienteOriginal) {
          const allowedValueForCurrentInput = maxCantidadPendienteOriginal - sumOfQuantitiesExcludingCurrent;
          proposedValue = Math.max(0, allowedValueForCurrentInput);
          
          Swal.fire({
              title: 'Límite excedido',
              text: `La cantidad total a devolver excede el pendiente disponible. Se ajustará a ${proposedValue}.`,
              icon: 'warning',
              timer: 2000,
              showConfirmButton: true
          });
          
          input.value = proposedValue;
      }
      
      editedEntries[entryId].cantidad = proposedValue;
      actualizarEstadoBotonEnviar();
  }

  function cambiarCantidad(entryId, delta, max) {
      const input = document.getElementById(`input-cantidad-${entryId}`);
      let currentValue = parseInt(input.value) || 0;
      let newValue = currentValue + delta;
      
      if (newValue < 0) {
          newValue = 0;
      }
      
      if (newValue > max) {
          newValue = max;
      }
      
      input.value = newValue;
      manejarInputDevolver(entryId, max);
  }

  function manejarInputSubarea(entryId) {
      const select = document.getElementById(`select-subarea-${entryId}`);
      editedEntries[entryId].subarea = select.value;
      actualizarEstadoBotonEnviar();
  }

  function actualizarEstadoBotonEnviar() {
      const hasValidEntries = Object.values(editedEntries).some(entry => entry.cantidad > 0);
      document.getElementById('btn-enviar').disabled = !hasValidEntries;
  }

  function enviarDevoluciones() {
      console.log('Iniciando envío de devoluciones...');
      
      const datosParaEnviar = [];
      let validationError = false;

      for (const entryId in editedEntries) {
          const currentEntry = editedEntries[entryId];
          const cantidadValida = currentEntry.cantidad > 0;
          
          if (cantidadValida) {
              // Validar que si el área tiene opciones de sub-área, se haya seleccionado una
              const opciones = obtenerOpcionesSubarea(currentEntry.area);
              if (opciones.length > 0 && (!currentEntry.subarea || currentEntry.subarea === '')) {
                  Swal.fire('Advertencia', `Para el producto '${currentEntry.producto}' del área '${currentEntry.area}', debe seleccionar una Sub-área.`, 'warning');
                  validationError = true;
                  break; 
              }
              
              // Asegurar que el rowId sea un número entero
              const rowId = parseInt(currentEntry.rowId);
              if (isNaN(rowId) || rowId <= 0) {
                  console.error('RowId inválido:', currentEntry.rowId);
                  continue;
              }
              
              datosParaEnviar.push({
                  rowId: rowId,
                  cantidad: parseInt(currentEntry.cantidad) || 0,
                  subarea: currentEntry.subarea || '',
                  colaborador: currentEntry.colaborador || '',
                  area: currentEntry.area || '',
                  producto: currentEntry.producto || '',
                  fechaOriginal: currentEntry.fechaOriginal || '',
                  horaOriginal: currentEntry.horaOriginal || '',
                  cantidadSalida: parseInt(currentEntry.cantidadSalida) || 0,
                  cantidadDevuelta: parseInt(currentEntry.cantidadDevuelta) || 0,
                  cantidadPendiente: parseInt(currentEntry.cantidadPendiente) || 0,
                  estado: currentEntry.estado || ''
              });
              
              console.log(`Preparando: ${currentEntry.producto} - Cantidad: ${currentEntry.cantidad} - Sub-área: ${currentEntry.subarea || 'N/A'} - RowId: ${rowId}`);
          }
      }

      if (validationError) {
          return;
      }

      if (datosParaEnviar.length === 0) {
          Swal.fire('Advertencia', 'No hay devoluciones válidas para enviar. Ingrese una cantidad mayor a 0 para proceder.', 'warning');
          return;
      }
      
      console.log(`Enviando ${datosParaEnviar.length} items al servidor...`);
      console.log('Datos a enviar:', JSON.stringify(datosParaEnviar, null, 2));
      
      const overlay = document.getElementById('overlay');
      overlay.style.display = 'flex';
      
      const scriptUrl = "https://script.google.com/macros/s/AKfycbw7_QvsS2T7_33OXHLt-jVurcbTs2DEghQkaRRCZP2BkwJ0DQZ6-cud_O8h_AhCupRJog/exec";
      
      $.ajax({
          url: scriptUrl,
          type: "POST",
          dataType: "json",
          data: {
              action: "actualizarDevoluciones",
              devoluciones: JSON.stringify(datosParaEnviar)
          },
          success: function(response) {
              overlay.style.display = 'none';
              console.log("Respuesta del servidor:", response);
              
              if (response.success) {
                  Swal.fire({
                      title: '¡Éxito!',
                      html: `Devoluciones registradas correctamente.<br>Registros procesados: ${response.registrosProcesados}<br>Filas actualizadas: ${response.filasActualizadas}<br><br>${response.detalle || ''}`,
                      icon: 'success',
                      confirmButtonText: 'Aceptar'
                  }).then(() => {
                      location.reload();
                  });
              } else {
                  Swal.fire({
                      title: 'Error',
                      text: response.error || 'Error al procesar las devoluciones',
                      icon: 'error',
                      confirmButtonText: 'Entendido'
                  });
              }
          },
          error: function(xhr, status, error) {
              overlay.style.display = 'none';
              console.error("Error en la solicitud:", status, error);
              console.error("Respuesta del servidor:", xhr.responseText);
              
              Swal.fire({
                  title: 'Error de conexión',
                  text: 'No se pudo conectar con el servidor. Intente nuevamente.',
                  icon: 'error',
                  confirmButtonText: 'Entendido'
              });
          }
      });
  }
</script>
